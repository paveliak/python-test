name: Test setup-python

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Python version'
        default: '3.14t'
 
jobs:
  test:
    runs-on: windows-latest
    steps:
    - run: ls c:\hostedtoolcache\windows\Python\3.14.4

    - uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ inputs.version }}

    - run: ls c:\hostedtoolcache\windows\Python\3.14.4
      if: always()
    
