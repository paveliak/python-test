name: Test setup-python

on:
  workflow_dispatch:
    inputs:
      version1:
        description: 'Python version1'
        default: '3.14'
      version2:
        description: 'Python version2'
        default: '3.14t'
 
jobs:
  test:
    runs-on: windows-11-arm
    steps:
    #- run: |
    #    Start-Process -FilePath 'c:\hostedtoolcache\windows\Python\3.14.4\arm64\python-3.14.4-arm64.exe' -ArgumentList @('/uninstall', '/quiet') -Wait
    #    Remove-Item -Recurse -Force 'c:\hostedtoolcache\windows\Python\3.14.4'

    - run: |
        which python.exe
        python.exe -VV
    
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ inputs.version1 }}

    - run: |
        which python.exe
        python.exe -VV
    
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ inputs.version2 }}

    - run: |
        which python.exe
        python.exe -VV

    - uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ inputs.version1 }}
        
    - run: |
        which python.exe
        python.exe -VV

    - uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ inputs.version2 }}
        
    - run: |
        which python.exe
        python.exe -VV

    - uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{ inputs.version1 }}
        
    - run: |
        which python.exe
        python.exe -VV

    - uses: paveliak/debug-it@v2
